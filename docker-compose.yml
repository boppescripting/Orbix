version: '3.8'

services:
  backend:
    image: ghcr.io/boppescripting/orbix-backend:latest
    build: ./backend
    ports:
      - "3001:3001"
    volumes:
      - ./data:/app/data
    environment:
      - JWT_SECRET=change-me-in-production
      - PORT=3001
      - DB_PATH=/app/data/dashboard.db
    restart: unless-stopped

  frontend:
    image: ghcr.io/boppescripting/orbix-frontend:latest
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped